<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>站点配置管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div id="auth-box" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg">
        <h2 class="text-2xl font-bold mb-4">管理验证</h2>
        <input type="password" id="pwd" class="w-full p-2 border mb-4 rounded" placeholder="输入 site.config.js 中的密码">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded">进入管理</button>
    </div>

    <div id="editor-box" class="hidden max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h2 class="text-2xl font-bold mb-6 flex justify-between">
            配置编辑器
            <button onclick="exportConfig()" class="bg-green-600 text-sm text-white px-4 py-2 rounded">导出 site.config.js</button>
        </h2>
        <div class="space-y-4">
            <div>
                <label class="block font-bold">Webhook 地址</label>
                <input type="text" id="conf-webhook" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block font-bold">Hero 标题</label>
                <input type="text" id="conf-title" class="w-full p-2 border rounded">
            </div>
            <p class="text-red-500 text-sm">提示：更多高级修改（如套餐增删）请直接编辑 site.config.js 文件。</p>
        </div>
    </div>

    <script src="assets/js/site.config.js"></script>
    <script>
        function login() {
            const p = document.getElementById('pwd').value;
            if(p === SiteConfig.settings.adminPassword) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('editor-box').classList.remove('hidden');
                loadData();
            } else { alert('密码错误'); }
        }

        function loadData() {
            document.getElementById('conf-webhook').value = SiteConfig.settings.webhookUrl;
            document.getElementById('conf-title').value = SiteConfig.hero.title;
        }

        function exportConfig() {
            SiteConfig.settings.webhookUrl = document.getElementById('conf-webhook').value;
            SiteConfig.hero.title = document.getElementById('conf-title').value;
            
            const content = "const SiteConfig = " + JSON.stringify(SiteConfig, null, 4) + ";";
            const blob = new Blob([content], {type: 'text/javascript'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'site.config.js';
            a.click();
        }
    </script>
</body>
</html>
